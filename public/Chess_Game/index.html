<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <section class="game-shell" aria-labelledby="game-title">
            <div class="header">
                <div>
                    <p class="eyebrow">Classic Strategy</p>
                    <h1 id="game-title">Chess Game</h1>
                    <div class="feature-chips" aria-label="Game features">
                        <span>Legal Moves</span>
                        <span>Checkmate</span>
                        <span>Undo</span>
                    </div>
                </div>
                <div class="turn-card" id="turnCard">
                    <span>Turn</span>
                    <strong id="turnLabel">White</strong>
                </div>
            </div>

            <div class="layout">
                <section class="board-panel" aria-label="Chess board area">
                    <div class="player-strip top-player">
                        <span>Black</span>
                        <strong aria-label="Black King" role="img"><span aria-hidden="true">♚</span></strong>
                    </div>
                    
                    <div class="board-frame">
                        <div id="board" class="board" role="region" aria-label="Chess board"></div>
                    </div>
                    
                    <div class="player-strip bottom-player">
                        <span>White</span>
                        <strong aria-label="White King" role="img"><span aria-hidden="true">♔</span></strong>
                    </div>
                </section>

                <aside class="side-panel">
                    <div class="status-card">
                        <span>Game Status</span>
                        <p id="status" class="status" role="status" aria-live="polite">White to move.</p>
                    </div>

                    <div class="controls" aria-label="Game controls">
                        <button id="backHome" type="button"><span aria-hidden="true">⌂</span> Home</button>
                        <button id="newGame" type="button"><span aria-hidden="true">↻</span> New Game</button>
                        <button id="undoMove" type="button"><span aria-hidden="true">↶</span> Undo</button>
                        <button id="flipBoard" type="button"><span aria-hidden="true">⇅</span> Flip Board</button>
                    </div>

                    <div class="info-grid">
                        <div>
                            <span>White Captures</span>
                            <p id="whiteCaptures" class="captures">None</p>
                        </div>
                        <div>
                            <span>Black Captures</span>
                            <p id="blackCaptures" class="captures">None</p>
                        </div>
                    </div>

                    <div class="moves-box">
                        <div class="moves-title">
                            <span>Moves</span>
                            <strong id="moveCount">0</strong>
                        </div>
                        <ol id="moveList" class="move-list"></ol>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="promotionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="promotionTitle">
        <div class="modal-content">
            <h2 id="promotionTitle">Promote Pawn</h2>
            <div class="promotion-options">
                <button type="button" data-piece="q" aria-label="Promote to Queen">♛</button>
                <button type="button" data-piece="r" aria-label="Promote to Rook">♜</button>
                <button type="button" data-piece="b" aria-label="Promote to Bishop">♝</button>
                <button type="button" data-piece="n" aria-label="Promote to Knight">♞</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
